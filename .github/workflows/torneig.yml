# =====================================================================
# ALPHA ARTIFICIAL — Ronda setmanal automàtica
# ---------------------------------------------------------------------
# Cada dilluns a les 07:30 UTC (09:30 a Espanya a l'estiu, 08:30 a
# l'hivern), GitHub executa el torneig sencer sense que ningú toqui res:
#   1. Baixa preus reals i titulars.
#   2. Pregunta a les 5 IAs (les claus surten dels "Secrets" del repo).
#   3. Guarda els resultats a dades/ i regenera web/dades.json.
#   4. Publica la web actualitzada a GitHub Pages.
#
# També es pot llançar quan es vulgui:
#   - pestanya Actions → "Ronda setmanal del torneig" → "Run workflow"
#   - o canviant el contingut del fitxer .llancar-ronda
# =====================================================================
name: Ronda setmanal del torneig

on:
  schedule:
    # Dilluns a les 07:37 UTC. Fem servir un minut "estrany" (37 i no 30)
    # a propòsit: GitHub va molt carregat a les hores en punt i mitges, i
    # les tasques d'aquestes hores arriben tard o es salten. Un minut poc
    # concorregut sol ser força més puntual.
    - cron: "37 7 * * 1"
  workflow_dispatch:             # botó "Run workflow" per llançar-la a mà
  push:
    paths: [".llancar-ronda"]    # tocar aquest fitxer = ronda extra

concurrency:
  group: torneig                 # mai dues rondes alhora
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # 1) Jugar la ronda i guardar els resultats
  # ------------------------------------------------------------------
  ronda:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write            # per guardar els resultats al repositori
    steps:
      - name: Baixar el codi del repositori
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instal·lar les llibreries
        run: pip install -r requirements.txt

      - name: Executar la ronda i actualitzar les dades de la web
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
        run: |
          python torneo.py
          python generar_web.py

      - name: Guardar els resultats al repositori
        run: |
          git config user.name "alpha-artificial-bot"
          git config user.email "alpha-artificial-bot@users.noreply.github.com"
          git add dades web/dades.json
          git commit -m "Ronda setmanal · $(date +%d/%m/%Y)" || echo "Res de nou a guardar"
          git push

  # ------------------------------------------------------------------
  # 2) Publicar la web amb les dades noves
  #    (els commits d'un robot no disparen altres robots; per això la
  #     publicació va aquí mateix, just després de la ronda)
  # ------------------------------------------------------------------
  publicar:
    needs: ronda
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.desplegament.outputs.page_url }}
    steps:
      - name: Baixar l'última versió (amb els resultats de la ronda)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empaquetar la carpeta web/
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Publicar
        id: desplegament
        uses: actions/deploy-pages@v4
