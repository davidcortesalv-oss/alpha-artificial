# =====================================================================
# ALPHA ARTIFICIAL — Ronda setmanal automàtica
# ---------------------------------------------------------------------
# Cada dilluns a les 07:30 UTC (09:30 a Espanya a l'estiu, 08:30 a
# l'hivern), GitHub executa el torneig sencer sense que ningú toqui res:
#   1. Baixa preus reals i titulars.
#   2. Pregunta a les 5 IAs (les claus surten dels "Secrets" del repo).
#   3. Guarda els resultats a dades/ i regenera web/dades.json.
#   4. Fa commit dels resultats → això dispara la publicació de la web.
#
# També es pot llançar a mà: pestanya Actions → "Ronda setmanal del
# torneig" → botó "Run workflow". Útil per a la primera ronda.
# =====================================================================
name: Ronda setmanal del torneig

on:
  schedule:
    - cron: "30 7 * * 1"   # cada dilluns a les 07:30 UTC
  workflow_dispatch:        # …i quan es vulgui, amb el botó "Run workflow"

concurrency:
  group: torneig            # mai dues rondes alhora
  cancel-in-progress: false

permissions:
  contents: write           # per poder guardar els resultats al repositori

jobs:
  ronda:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Baixar el codi del repositori
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instal·lar les llibreries
        run: pip install -r requirements.txt

      - name: Executar la ronda i actualitzar la web
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
        run: |
          python torneo.py
          python generar_web.py

      - name: Guardar els resultats al repositori
        run: |
          git config user.name "alpha-artificial-bot"
          git config user.email "actions@users.noreply.github.com"
          git add dades web/dades.json
          git commit -m "Ronda setmanal · $(date +%d/%m/%Y)" || echo "Res de nou a guardar"
          git push
